[project]
name = "spooklight"
version = "0.1.0"
description = "Default template for PDM package"
authors = [
    {name = "B.T. Franklin", email = "brandon.franklin@gmail.com"},
]
dependencies = [
    "openai>=2.11.0",
    "promptdown>=1.0.1",
    "python-dotenv>=1.2.1",
    "pillow>=12.0.0",
]
requires-python = "==3.12.*"
readme = "README.md"
license = {text = "MIT"}

[project.scripts]
spooklight = "spooklight.main:main"

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm]
distribution = true

[tool.pdm.build]
excludes = ["tests/**"]

[tool.pdm.dev-dependencies]
dev = [
    "pytest>=8.3.5",
    "flake8>=7.1.2",
]
